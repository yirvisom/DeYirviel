<link rel="icon" type="image/svg+xml" href="/logo.svg">
<style>
    /* Premium Corporate Finance Palette Override */
    :root {
        --theme: #0A192F !important;       /* Deep Midnight Navy */
        --primary: #1E293B !important;     /* Dark Slate Text */
        --secondary: #64748B !important;   /* Muted Slate Subtitles */
        --bg: #F8FAFC !important;          /* Crisp Off-White Background */
        --code-bg: #F1F5F9 !important;     /* Light Grey Code Background */
        --border: #E2E8F0 !important;      /* Clean Grid Lines */
    }

    /* Sharp Editorial Typography */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Georgia, Garamond, serif !important;
        letter-spacing: -0.01em !important;
        background-color: var(--bg) !important;
        color: var(--primary) !important;
    }

    /* Structured Financial Data Tables */
    table {
        width: 100% !important;
        border-collapse: collapse !important;
        margin: 24px 0 !important;
        font-variant-numeric: tabular-nums !important; 
    }

    table th {
        background-color: #0A192F !important;
        color: #FFFFFF !important;
        font-weight: 600 !important;
        padding: 12px !important;
        text-align: left !important;
    }

    table td {
        padding: 12px !important;
        border-bottom: 1px solid var(--border) !important;
    }

    /* ==========================================================================
       STYLING DU LOGO & CORRECTIF RESPONSIVE (PaperMod Override)
       ========================================================================== */

    /* 1. Intégration du logo à gauche du bloc de marque (PC & Mobile) */
    .logo {
        display: flex !important;
        flex-direction: row !important;
        align-items: center !important;
        gap: 14px !important; /* Espace entre le logo et le texte */
    }

    /* Injection de la ligature dorée */
    .logo::before {
        content: "";
        display: inline-block !important;
        width: 36px;  /* Taille idéale du logo */
        height: 36px;
        background-image: url("/logo.svg");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        flex-shrink: 0 !important; /* Empêche le logo de se déformer */
    }

    /* On s'assure que le titre et le sous-titre restent empilés verticalement comme avant */
    .logo a {
        display: flex !important;
        flex-direction: column !important;
        align-items: flex-start !important;
    }

    /* ==========================================================================
       2. COMPATIBILITÉ TÉLÉPHONE (Media Query < 768px)
       ========================================================================== */
    @media (max-width: 768px) {
        /* Force la barre de navigation globale à s'ordonner verticalement */
        .nav {
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 15px 10px !important;
            row-gap: 16px !important;
            width: 100% !important;
        }

        /* Centre tout le bloc Marque (Logo + Titres) sur mobile */
        .logo {
            justify-content: center !important;
            margin: 0 auto !important;
            gap: 10px !important;
        }

        .logo a {
            align-items: center !important; /* Centre le sous-titre sous DeYirviel sur mobile */
        }

        /* Réduction subtile des tailles pour que rien ne déborde sur petit écran */
        .logo a h1, .logo a span {
            font-size: 24px !important;
        }

        /* Gestion propre du sous-titre sur mobile */
        .logo a small, .brand-subtitle {
            font-size: 9px !important;
            letter-spacing: 0.05em !important;
            white-space: nowrap !important; /* Garde la ligne propre */
        }

        /* Réalignement horizontal du menu (Projects, Blog, About, CV) au centre */
        #menu {
            position: relative !important;
            overflow-x: visible !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        #menu ul {
            display: flex !important;
            flex-wrap: wrap !important; /* Passe à la ligne si l'écran est minuscule */
            justify-content: center !important;
            gap: 15px !important;
            padding: 0 !important;
        }
    }
</style>
