<link rel="icon" type="image/svg+xml" href="/logo.svg">
<style>
    /* Premium Corporate Finance Palette Override */
    :root {
        --theme: #0A192F !important;       /* Deep Midnight Navy */
        --primary: #1E293B !important;     /* Dark Slate Text */
        --secondary: #64748B !important;   /* Muted Slate Subtitles */
        --bg: #F8FAFC !important;          /* Crisp Off-White Background */
        --code-bg: #F1F5F9 !important;     /* Light Grey Code Background */
        --border: #E2E8F0 !important;      /* Clean Grid Lines */
    }

    /* Sharp Editorial Typography */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Georgia, Garamond, serif !important;
        letter-spacing: -0.01em !important;
        background-color: var(--bg) !important;
        color: var(--primary) !important;
    }

    /* Structured Financial Data Tables */
    table {
        width: 100% !important;
        border-collapse: collapse !important;
        margin: 24px 0 !important;
        font-variant-numeric: tabular-nums !important; /* Perfect tabular numeric alignment */
    }

    table th {
        background-color: #0A192F !important;
        color: #FFFFFF !important;
        font-weight: 600 !important;
        padding: 12px !important;
        text-align: left !important;
    }

    table td {
        padding: 12px !important;
        border-bottom: 1px solid var(--border) !important;
    }
/* --- Correctif Responsive pour le Header (Mobile) --- */
@media (max-width: 768px) {
    /* 1. On force le conteneur du header à s'aligner verticalement */
    header, .nav-container, nav { 
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        text-align: center !important;
        padding: 15px 10px !important;
        gap: 12px !important;
        width: 100% !important;
    }

    /* 2. On réduit légèrement la taille des textes pour mobile */
    .site-brand, h1 {
        font-size: 24px !important; /* Réduit la taille du titre principal */
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        gap: 6px !important;
    }

    .brand-subtitle, small {
        font-size: 9px !important; /* Évite que le sous-titre déborde */
        letter-spacing: 0.05em !important;
        white-space: normal !important; /* Permet le retour à la ligne si nécessaire */
    }

    /* 3. On organise les liens de navigation (Projects, Blog, About...) */
    .nav-links, .menu, .controls { 
        display: flex !important;
        flex-wrap: wrap !important; /* Si les liens sont trop longs, ils passent à la ligne suivante */
        justify-content: center !important;
        gap: 14px !important;
        padding: 0 !important;
        margin-top: 5px !important;
    }

    .nav-links a {
        font-size: 14px !important;
    }
}
</style>
