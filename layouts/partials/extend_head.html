<link rel="icon" type="image/svg+xml" href="/logo.svg">
<style>
    /* Premium Corporate Finance Palette Override */
    :root {
        --theme: #0A192F !important;       /* Deep Midnight Navy */
        --primary: #1E293B !important;     /* Dark Slate Text */
        --secondary: #64748B !important;   /* Muted Slate Subtitles */
        --bg: #F8FAFC !important;          /* Crisp Off-White Background */
        --code-bg: #F1F5F9 !important;     /* Light Grey Code Background */
        --border: #E2E8F0 !important;      /* Clean Grid Lines */
    }

    /* Sharp Editorial Typography */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Georgia, Garamond, serif !important;
        letter-spacing: -0.01em !important;
        background-color: var(--bg) !important;
        color: var(--primary) !important;
    }

    /* Structured Financial Data Tables */
    table {
        width: 100% !important;
        border-collapse: collapse !important;
        margin: 24px 0 !important;
        font-variant-numeric: tabular-nums !important; 
    }

    table th {
        background-color: #0A192F !important;
        color: #FFFFFF !important;
        font-weight: 600 !important;
        padding: 12px !important;
        text-align: left !important;
    }

    table td {
        padding: 12px !important;
        border-bottom: 1px solid var(--border) !important;
    }

    /* ==========================================================================
       STYLING DU LOGO & CORRECTIF RESPONSIVE (PaperMod Override)
       ========================================================================== */

    /* 1. Intégration du logo à gauche du bloc de marque (PC & Mobile) */
    .logo {
        display: flex !important;
        flex-direction: row !important;
        align-items: center !important;
        gap: 14px !important; /* Espace entre le logo et le texte */
    }

    /* Injection de la ligature dorée */
    .logo::before {
        content: "";
        display: inline-block !important;
        width: 36px;  /* Taille idéale du logo */
        height: 36px;
        background-image: url("/logo.svg");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        flex-shrink: 0 !important; /* Empêche le logo de se déformer */
    }

    /* On s'assure que le titre et le sous-titre restent empilés verticalement comme avant */
    .logo a {
        display: flex !important;
        flex-direction: column !important;
        align-items: flex-start !important;
    }

    /* ==========================================================================
      /* ==========================================================================
       2. COMPATIBILITÉ TÉLÉPHONE (Media Query < 768px)
       ========================================================================== */
    @media (max-width: 768px) {
        /* On casse le positionnement absolu par défaut du thème PaperMod */
        .nav {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 20px 10px !important;
            width: 100% !important;
        }

        /* Centre le bloc complet Marque (Logo + Titre + Subtitle) */
        .logo {
            display: flex !important;
            justify-content: center !important;
            margin: 0 auto 10px auto !important;
        }

        .logo a {
            align-items: center !important; /* Centre les textes sous le logo */
            text-align: center !important;
        }

        /* Force le menu (Projects, Blog, etc.) à descendre en dessous du titre */
        #menu {
            position: static !important; /* Supprime le blocage absolu sur la droite */
            display: block !important;
            visibility: visible !important;
            width: 100% !important;
            margin: 10px 0 0 0 !important;
            padding: 0 !important;
        }

        /* Aligne la liste des liens horizontalement et bien centrée */
        #menu ul {
            display: flex !important;
            flex-direction: row !important; /* Aligne les liens côte à côte */
            flex-wrap: wrap !important;     /* Permet de passer à la ligne si écran trop petit */
            justify-content: center !important; /* Centre parfaitement les liens */
            align-items: center !important;
            gap: 20px !important;            /* Espace confortable pour cliquer avec le pouce */
            padding: 0 !important;
            margin: 0 !important;
            list-style: none !important;
        }

        #menu ul li a {
            font-size: 15px !important;
            display: inline-block !important;
            padding: 5px 2px !important;
        }

        /* Réduction de la taille globale du titre pour mobile */
        .logo a h1, .logo a span {
            font-size: 22px !important;
        }

        .logo a small, .brand-subtitle {
            font-size: 9px !important;
            white-space: normal !important; /* Permet au sous-titre de respirer */
            text-align: center !important;
        }
    }
</style>
